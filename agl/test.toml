
[project]
name = "agentlightning"
version = "0.3.1"
description = "Agent-lightning is the absolute trainer to light up AI agents."
requires-python = ">=3.10"
# 基础依赖 (原本的 dependencies)
dependencies = [
  "graphviz",
  "psutil",
  "gpustat",
  "setproctitle",
  "flask",
  "agentops>=0.4.13",
  "uvicorn",
  "fastapi",
  "aiohttp",
  "opentelemetry-api>=1.35",
  "opentelemetry-sdk>=1.35",
  "opentelemetry-exporter-otlp>=1.35",
  "litellm[proxy]>=1.74",
  "pydantic>=2.11",
  "openai",
  "rich",
  "portpicker",
  "gunicorn",
  "uvicorn_worker",
  "aiologic",
  # 以下为原 tool.uv.override-dependencies 强制覆盖的部分，pip 环境下建议直接写入主依赖
  "mcp>=1.19.0",
  "numpy>=2.0.0,<2.3.0",
  "setuptools>=80.9.0",
]

[project.optional-dependencies]
# --- 基础工具组 ---
apo = ["poml"]
weave = ["weave>=0.52.22"]
mongo = ["pymongo"]

# 冲突说明：core-stable 与 core-legacy 冲突
core-stable = [
  "agentops>=0.4.21",
  "openai>=2.0.0",
]

# 冲突说明：torch-cu128 与 torch-cpu 冲突
torch-cu128 = [
  "torch",
  "torchvision",
]

# --- 训练稳定组 ---

torch-stable = [
  "agentops>=0.4.21", # 来自 core-stable
  "openai>=2.0.0",    # 来自 core-stable
  "torch>=2.8.0",
  "torchvision>=0.23.0",
  "tensordict>=0.9.1",
  "transformers>=4.55.0,!=4.57.2",
  "vllm>=0.10.2,!=0.11.1,!=0.11.2,!=0.12.0",
  "litellm[proxy]>=1.78",
]


# --- GPU 组合包 ---
verl = [
  "verl>=0.5.0",
  "vllm>=0.8.4",
]

torch-gpu-stable = [
  "torch",            
  "torchvision",     
  "flash-attn>=2.8.3",
  "tensordict>=0.9.1",
  "verl>=0.6.0",
  "agentops>=0.4.21", # 来自 torch-stable
  "transformers>=4.55.0",
  "vllm>=0.10.2",
]


# --- 示例与集成组 ---
trl = [
  "unsloth>=2025.10.1",
  "unsloth_zoo>=2025.10.1",
  "bitsandbytes",
  "peft",
  "datasets",
  "transformers",
  "trl",
  "kernels",
  "vllm",
  "torch>=2.8.0",     # 来自 torch-stable
]

tinker = [
  "tinker>=0.2.2",
  "tinker_cookbook>=0.1.0",
  "wandb",
  "torch>=2.8.0",     # 来自 torch-stable
]

image = [
  "datasets",
  "Pillow",
  "pandas",
  "pyarrow",
  "qwen-vl-utils",
]

# --- Agent 框架组 ---
autogen = [
  "autogen-agentchat",
  "autogen-ext[openai]",
  "mcp>=1.10.0",
]

openai-agents = [
  "openai-agents",
  "openai",
  "mcp",
  "pandas",
]

anthropic = ["anthropic"]

langchain = [
  "langgraph>=1.0.0",
  "langchain[openai]>=1.0.0",
  "langchain-community>=0.4.0",
  "langchain-text-splitters>=1.0.0",
]

sql = ["sqlparse", "nltk"]
rag = [
  "fastmcp>=2.13.1",
  "faiss-cpu>=1.11.0",
  "sentence-transformers>=4.1.0",
]
crewai = ["crewai[tools]>=1.2.0,!=1.2.1"]
swebench = ["swebench"]

# --- 汇总组 ---
agents = [
  "agentlightning[autogen]",
  "agentlightning[openai-agents]",
  "agentlightning[anthropic]",
  "agentlightning[langchain]",
  "agentlightning[sql]",
  "agentlightning[rag]",
  "agentlightning[crewai]",
  "agentlightning[swebench]",
]

# --- 开发环境 (原本的 dev dependency-group) ---
dev = [
  "flake8",
  "pytest",
  "hatch",
  "pytest-asyncio",
  "pre-commit",
  "pytest-rerunfailures",
  "black",
  "isort",
  "pyright",
  "mkdocs",
  "mkdocs-material",
  "mkdocstrings[python]",
  "mike",
  "prometheus-client",
]

custom-xoxo = [
  "agentlightning[apo]",
  "agentlightning[weave]",
  "agentlightning[mongo]",
  "agentlightning[torch-stable]",
  "agentlightning[verl]",
  "agentlightning[trl]",
  "agentlightning[tinker]",
  "agentlightning[image]",
  "agentlightning[agents]",
  "agentlightning[dev]",
]

[project.scripts]
agl = "agentlightning.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"